# Phase 2a: TalosControlPlane architecture
# Apply FIRST (before adding new hosts, before draining management nodes)
# TCP will create Machine objects but stay Pending (no available hosts yet)
#
# After draining node4+node5 from management, apply phase2-hosts.yaml
# to make them available → CAPHR auto-provisions them

# ─── HetznerRobotMachineTemplate for Control Planes ──────────────────────────
# hostSelector picks any available HetznerRobotHost labeled role=control-plane

apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotMachineTemplate
metadata:
  name: talos-production-cp-template
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
spec:
  template:
    spec:
      hostSelector:
        matchLabels:
          role: control-plane
      talosSchematic: 3da7f440f279f4814fa73bdf83c84710a8e93c40a4a3cbba4d969f14afb96298
      talosVersion: v1.12.4
      installDisk: /dev/nvme0n1

# ─── TalosControlPlane ───────────────────────────────────────────────────────
# replicas=2: will manage node4 + node5
# node1 continues as individual Machine (host already claimed, TCP skips it)
# Phase 3: increase to 3 after transitioning node1

---
apiVersion: controlplane.cluster.x-k8s.io/v1alpha3
kind: TalosControlPlane
metadata:
  name: talos-production-tcp
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
spec:
  replicas: 2
  version: v1.35.2
  infrastructureTemplate:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: HetznerRobotMachineTemplate
    name: talos-production-cp-template
    namespace: caphr
  controlPlaneConfig:
    controlplane:
      generateType: controlplane
      talosVersion: v1.12.4
