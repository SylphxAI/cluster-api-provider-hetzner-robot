---
# CAPHR Phase 1: Provision node1 (CP init) + node3 (worker)
# node2/4/5 remain as management cluster
#
# Apply:
#   kubectl -n caphr apply -f examples/phase1-cluster.yaml

# ─── Physical Server Inventory ───────────────────────────────────────────────
# Create HetznerRobotHost objects FIRST — these represent the physical servers.
# The HRM controller will claim them during provisioning.

apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotHost
metadata:
  name: ax162-node1
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
    role: control-plane
spec:
  serverID: 2920324
  serverIP: "162.55.233.221"
  installDisk: /dev/nvme0n1
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotHost
metadata:
  name: ax162-node3
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
    role: worker
spec:
  serverID: 2932729
  serverIP: "91.98.182.116"
  installDisk: /dev/nvme0n1

---
# ─── Cluster Definition ──────────────────────────────────────────────────────

apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: talos-production
  namespace: caphr
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
      - 10.100.0.0/16   # Different CIDR from management cluster (10.244.0.0/16)
    services:
      cidrBlocks:
      - 10.200.0.0/12
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: HetznerRobotCluster
    name: talos-production
    namespace: caphr

---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotCluster
metadata:
  name: talos-production
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
spec:
  controlPlaneEndpoint:
    host: 162.55.233.221   # node1 public IP
    port: 6443
  robotSecretRef:
    name: robot-credentials
    namespace: caphr
  sshSecretRef:
    name: caphr-ssh-secret
    namespace: caphr

---
# ─── Control Plane Node 1 (init) ─────────────────────────────────────────────

apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
kind: TalosConfig
metadata:
  name: talos-production-node1
  namespace: caphr
spec:
  generateType: init
  talosVersion: v1.12.4
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotMachine
metadata:
  name: talos-production-node1
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
    cluster.x-k8s.io/control-plane: ""
spec:
  hostRef:
    name: ax162-node1
  talosSchematic: 3da7f440f279f4814fa73bdf83c84710a8e93c40a4a3cbba4d969f14afb96298
  talosVersion: v1.12.4
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Machine
metadata:
  name: talos-production-node1
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
    cluster.x-k8s.io/control-plane: ""
spec:
  clusterName: talos-production
  version: v1.35.2
  bootstrap:
    configRef:
      apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
      kind: TalosConfig
      name: talos-production-node1
      namespace: caphr
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: HetznerRobotMachine
    name: talos-production-node1
    namespace: caphr

---
# ─── Worker Node 3 ───────────────────────────────────────────────────────────

apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
kind: TalosConfig
metadata:
  name: talos-production-node3
  namespace: caphr
spec:
  generateType: worker
  talosVersion: v1.12.4
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotMachine
metadata:
  name: talos-production-node3
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
spec:
  hostRef:
    name: ax162-node3
  talosSchematic: 3da7f440f279f4814fa73bdf83c84710a8e93c40a4a3cbba4d969f14afb96298
  talosVersion: v1.12.4
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Machine
metadata:
  name: talos-production-node3
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
spec:
  clusterName: talos-production
  version: v1.35.2
  bootstrap:
    configRef:
      apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
      kind: TalosConfig
      name: talos-production-node3
      namespace: caphr
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: HetznerRobotMachine
    name: talos-production-node3
    namespace: caphr
