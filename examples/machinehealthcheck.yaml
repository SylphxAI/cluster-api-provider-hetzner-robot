# MachineHealthCheck for control-plane nodes.
# maxUnhealthy: 34% provides quorum protection — won't remediate more than 1/3 of CP nodes.
# With 3 CP nodes, this means at most 1 can be remediated simultaneously.
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineHealthCheck
metadata:
  name: cp-health-check
  namespace: caphr
spec:
  clusterName: talos-production
  maxUnhealthy: 34%
  selector:
    matchLabels:
      cluster.x-k8s.io/control-plane: ""
  unhealthyConditions:
    - type: Ready
      status: Unknown
      timeout: 300s
    - type: Ready
      status: "False"
      timeout: 300s
  remediationTemplate:
    kind: HetznerRobotRemediationTemplate
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    name: cp-remediation
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotRemediationTemplate
metadata:
  name: cp-remediation
  namespace: caphr
spec:
  template:
    spec:
      strategy:
        type: Reboot
        retryLimit: 2
        timeout: 300s
---
# MachineHealthCheck for worker nodes.
# Workers use matchExpressions to select Machines WITHOUT the control-plane label.
# maxUnhealthy: 1 (absolute) — with only 2 workers, never remediate both simultaneously.
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineHealthCheck
metadata:
  name: worker-health-check
  namespace: caphr
spec:
  clusterName: talos-production
  maxUnhealthy: 1
  selector:
    matchExpressions:
      - key: cluster.x-k8s.io/control-plane
        operator: DoesNotExist
  unhealthyConditions:
    - type: Ready
      status: Unknown
      timeout: 300s
    - type: Ready
      status: "False"
      timeout: 300s
  remediationTemplate:
    kind: HetznerRobotRemediationTemplate
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    name: worker-remediation
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotRemediationTemplate
metadata:
  name: worker-remediation
  namespace: caphr
spec:
  template:
    spec:
      strategy:
        type: Reboot
        retryLimit: 3
        timeout: 180s
