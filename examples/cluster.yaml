---
# CAPHR-managed Talos cluster on Hetzner Robot bare metal
# 3 control-plane nodes (node1/2/4) + 2 worker nodes (node3/5)
#
# Prerequisites:
#   - CAPI + CAPT + CAPHR installed on management cluster
#   - robot-credentials secret in caphr namespace
#   - caphr-ssh-secret in caphr namespace
#
# IMPORTANT: Before applying, drain each node from the current management cluster!

# ─── Physical Server Inventory ───────────────────────────────────────────────
# One HetznerRobotHost per physical server. These are permanent — never deleted
# automatically. Machines claim hosts from this pool during provisioning.

apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotHost
metadata:
  name: ax162-node1
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
    role: control-plane
spec:
  serverID: 2920324
  serverIP: "162.55.233.221"
  internalIP: "10.10.0.1"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotHost
metadata:
  name: ax162-node2
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
    role: control-plane
spec:
  serverID: 2927556
  serverIP: "168.119.195.121"
  internalIP: "10.10.0.2"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotHost
metadata:
  name: ax162-node3
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
    role: worker
spec:
  serverID: 2932729
  serverIP: "91.98.182.116"
  internalIP: "10.10.0.3"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotHost
metadata:
  name: ax162-node4
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
    role: control-plane
spec:
  serverID: 2932787
  serverIP: "91.98.183.14"
  internalIP: "10.10.0.4"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotHost
metadata:
  name: ax162-node5
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
    role: worker
spec:
  serverID: 2933228
  serverIP: "142.132.203.185"
  internalIP: "10.10.0.5"

---
# ─── Cluster Definition ──────────────────────────────────────────────────────

apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: talos-production
  namespace: caphr
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
      - 10.244.0.0/16
    services:
      cidrBlocks:
      - 10.96.0.0/12
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: HetznerRobotCluster
    name: talos-production
    namespace: caphr
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: HetznerRobotCluster
metadata:
  name: talos-production
  namespace: caphr
  labels:
    cluster.x-k8s.io/cluster-name: talos-production
spec:
  # Control plane endpoint — set to node1's IP (first CP).
  # After HA is achieved, update to an LB IP.
  controlPlaneEndpoint:
    host: 162.55.233.221
    port: 6443
  robotSecretRef:
    name: robot-credentials
    namespace: caphr
  sshSecretRef:
    name: caphr-ssh-secret
    namespace: caphr
  # Hetzner vSwitch VLAN 4000 — internal network for etcd peering and node communication.
  # Each host's internalIP is injected into the Talos machineconfig during provisioning.
  vlanConfig:
    id: 4000
    interface: enp193s0f0np0
    prefixLength: 24
