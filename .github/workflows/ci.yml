name: CI

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  push:
    branches-ignore:
      - main
    tags-ignore:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    # Dogfood Sylphx CI Compute. Do not use GitHub-hosted runners.
    runs-on: sylphx-linux-standard
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
            if [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
              base="$(git merge-base origin/main HEAD)"
            fi
          fi

          files="$(git diff --name-only --diff-filter=ACMR "$base" HEAD -- '*.go')"
          if [ -z "$files" ]; then
            exit 0
          fi

          unformatted="$(gofmt -l $files)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test ./...
