---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hetznerrobotmachines.infrastructure.cluster.x-k8s.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
  labels:
    cluster.x-k8s.io/v1beta1: v1alpha1
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    categories:
    - cluster-api
    kind: HetznerRobotMachine
    listKind: HetznerRobotMachineList
    plural: hetznerrobotmachines
    singular: hetznerrobotmachine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.labels.cluster\.x-k8s\.io/cluster-name
      name: Cluster
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: string
    - jsonPath: .status.provisioningState
      name: State
      type: string
    - jsonPath: .status.hostRef
      name: Host
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: HetznerRobotMachine is the Schema for the hetznerrobotmachines API.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: HetznerRobotMachineSpec defines the desired state of HetznerRobotMachine.
            properties:
              providerID:
                description: ProviderID is the unique identifier for this machine. Set automatically by the controller.
                type: string
              hostRef:
                description: >-
                  HostRef is a direct reference to a specific HetznerRobotHost by name.
                  Mutually exclusive with hostSelector. Use this for static per-server assignments.
                properties:
                  name:
                    description: Name of the referent.
                    type: string
                required:
                - name
                type: object
              hostSelector:
                description: >-
                  HostSelector selects an Available HetznerRobotHost by label.
                  Mutually exclusive with hostRef. Use this for dynamic pool claiming.
                properties:
                  matchExpressions:
                    items:
                      properties:
                        key:
                          type: string
                        operator:
                          type: string
                        values:
                          items:
                            type: string
                          type: array
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                  matchLabels:
                    additionalProperties:
                      type: string
                    type: object
                type: object
              talosSchematic:
                description: "TalosSchematic is the Talos factory schematic ID (with extensions)."
                type: string
              talosVersion:
                description: "TalosVersion is the Talos version to install (e.g. v1.12.4)."
                type: string
              installDisk:
                description: "InstallDisk is the disk to install Talos on. Defaults to /dev/nvme0n1"
                default: "/dev/nvme0n1"
                type: string
            required:
            - talosSchematic
            - talosVersion
            type: object
          status:
            description: HetznerRobotMachineStatus defines the observed state of HetznerRobotMachine.
            properties:
              ready:
                type: boolean
              addresses:
                items:
                  properties:
                    address:
                      type: string
                    type:
                      type: string
                  required:
                  - address
                  - type
                  type: object
                type: array
              provisioningState:
                description: ProvisioningState is the current state of provisioning.
                type: string
              hostRef:
                description: HostRef tracks which HetznerRobotHost was claimed by this machine.
                type: string
              retryCount:
                description: RetryCount tracks consecutive reconciliation errors.
                type: integer
              failureReason:
                type: string
              failureMessage:
                type: string
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    severity:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
