---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hetznerrobothosts.infrastructure.cluster.x-k8s.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
  labels:
    cluster.x-k8s.io/v1beta1: v1alpha1
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    categories:
    - cluster-api
    kind: HetznerRobotHost
    listKind: HetznerRobotHostList
    plural: hetznerrobothosts
    shortNames:
    - hrh
    singular: hetznerrobothost
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.serverID
      name: ServerID
      type: integer
    - jsonPath: .spec.serverIP
      name: ServerIP
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.machineRef.name
      name: Machine
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: >-
          HetznerRobotHost represents a single physical server in the Hetzner Robot pool.
          One HetznerRobotHost per physical server. Permanent — not deleted when a Machine is removed.
          When a HetznerRobotMachine needs a server, it claims an Available host via hostSelector.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: HetznerRobotHostSpec defines the desired state of a physical server.
            properties:
              serverID:
                description: ServerID is the Hetzner Robot server ID.
                minimum: 1
                type: integer
              serverIP:
                description: ServerIP is the public IP address of the server.
                type: string
              installDisk:
                description: InstallDisk is the disk on which Talos will be installed. Defaults to /dev/nvme0n1
                default: "/dev/nvme0n1"
                type: string
            required:
            - serverID
            - serverIP
            type: object
          status:
            description: HetznerRobotHostStatus defines the observed state of a physical server.
            properties:
              state:
                description: State is the current lifecycle state of the host.
                type: string
              machineRef:
                description: MachineRef is a reference to the HetznerRobotMachine that has claimed this host.
                properties:
                  name:
                    description: Name is the name of the HetznerRobotMachine.
                    type: string
                  namespace:
                    description: Namespace is the namespace of the HetznerRobotMachine.
                    type: string
                required:
                - name
                - namespace
                type: object
              errorMessage:
                description: ErrorMessage contains a human-readable description of a terminal error.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
