---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: hetznerrobothosts.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    categories:
    - cluster-api
    kind: HetznerRobotHost
    listKind: HetznerRobotHostList
    plural: hetznerrobothosts
    shortNames:
    - hrh
    singular: hetznerrobothost
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.serverID
      name: ServerID
      type: integer
    - jsonPath: .spec.serverIP
      name: ServerIP
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .status.consumerRef.name
      name: Consumer
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          HetznerRobotHost represents a single physical server in the Hetzner Robot pool.
          One HetznerRobotHost per physical server. Permanent — not deleted when a Machine is removed.
          When a HetznerRobotMachine needs a server, it claims an Available host via hostSelector.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HetznerRobotHostSpec defines the desired state of a physical
              server.
            properties:
              destructiveProvisioningPolicy:
                description: |-
                  DestructiveProvisioningPolicy declares whether CAPHR may wipe or reset this host.
                  Missing or unknown values fail closed.
                enum:
                - AlwaysCleanSlate
                - NeverDestructiveByDefault
                - RequiresExternalRelease
                type: string
              installDisk:
                default: /dev/nvme0n1
                description: |-
                  InstallDisk is the disk on which Talos will be installed.
                  Defaults to /dev/nvme0n1
                type: string
              internalIP:
                description: |-
                  InternalIP is the VLAN IP address for this server (e.g. "10.10.0.1").
                  Used with HetznerRobotCluster.Spec.VLANConfig to inject VLAN interface
                  config into the Talos machineconfig during provisioning.
                  Required when VLANConfig is set on the cluster.
                type: string
              lifecycleClass:
                description: |-
                  LifecycleClass declares the physical role of this host. Missing or unknown
                  values fail closed for destructive provisioning.
                enum:
                - compute
                - control-plane
                - storage
                type: string
              maintenanceMode:
                description: |-
                  MaintenanceMode prevents new claims and destructive provisioning for this host.
                  Existing status ownership is left intact so an operator can inspect and repair.
                type: boolean
              serverID:
                description: |-
                  ServerID is the Hetzner Robot server ID.
                  Find it in the Robot web console or via the Robot API.
                minimum: 1
                type: integer
              serverIP:
                description: |-
                  ServerIP is the public IPv4 address of the server.
                  Auto-detected from Hetzner Robot API if empty.
                type: string
              serverIPv6Net:
                description: |-
                  ServerIPv6Net is the IPv6 /64 subnet assigned by Hetzner (e.g. "2a01:4f8:271:3b49::/64").
                  Auto-detected from Hetzner Robot API if empty.
                  CAPHR injects {net}1/64 as the node's IPv6 address + fe80::1 as gateway
                  into the Talos machineconfig during provisioning. Enables dual-stack pods.
                type: string
            required:
            - serverID
            type: object
            x-kubernetes-validations:
            - message: serverID is immutable; create a new HetznerRobotHost for a
                different physical server
              rule: self.serverID == oldSelf.serverID
            - message: serverIP is immutable once populated
              rule: '!has(oldSelf.serverIP) || size(oldSelf.serverIP) == 0 || (has(self.serverIP)
                && self.serverIP == oldSelf.serverIP)'
            - message: serverIPv6Net is immutable once populated
              rule: '!has(oldSelf.serverIPv6Net) || size(oldSelf.serverIPv6Net) ==
                0 || (has(self.serverIPv6Net) && self.serverIPv6Net == oldSelf.serverIPv6Net)'
            - message: internalIP is immutable once populated
              rule: '!has(oldSelf.internalIP) || size(oldSelf.internalIP) == 0 ||
                (has(self.internalIP) && self.internalIP == oldSelf.internalIP)'
            - message: installDisk is immutable once populated
              rule: '!has(oldSelf.installDisk) || size(oldSelf.installDisk) == 0 ||
                (has(self.installDisk) && self.installDisk == oldSelf.installDisk)'
          status:
            description: HetznerRobotHostStatus defines the observed state of a physical
              server.
            properties:
              consumerRef:
                description: |-
                  ConsumerRef is a reference to the HetznerRobotMachine that has claimed this host.
                  Nil when the host is Available. This is the canonical ownership field.
                properties:
                  name:
                    description: Name is the name of the HetznerRobotMachine.
                    type: string
                  namespace:
                    description: Namespace is the namespace of the HetznerRobotMachine.
                    type: string
                required:
                - name
                - namespace
                type: object
              dirtyReason:
                description: DirtyReason explains why an Available host may still
                  need clean-slate provisioning.
                type: string
              errorMessage:
                description: ErrorMessage contains a human-readable description of
                  a terminal error.
                type: string
              hardwareDetails:
                description: HardwareDetails contains controller-discovered physical
                  facts from rescue mode.
                properties:
                  byIDPaths:
                    additionalProperties:
                      type: string
                    description: ByIDPaths maps detected disk devices to stable /dev/disk/by-id
                      paths.
                    type: object
                  cephDisks:
                    description: CephDisks is the subset of NVMeDisks with Ceph BlueStore
                      signatures.
                    items:
                      type: string
                    type: array
                  gatewayIP:
                    description: GatewayIP is the detected default gateway for the
                      public interface.
                    type: string
                  nvmeDisks:
                    description: NVMeDisks is the list of whole NVMe disk devices
                      detected in rescue.
                    items:
                      type: string
                    type: array
                  primaryMAC:
                    description: PrimaryMAC is the MAC address of the primary NIC.
                    type: string
                type: object
              lastConsumerRef:
                description: LastConsumerRef records the last HetznerRobotMachine
                  that owned this host.
                properties:
                  name:
                    description: Name is the name of the HetznerRobotMachine.
                    type: string
                  namespace:
                    description: Namespace is the namespace of the HetznerRobotMachine.
                    type: string
                required:
                - name
                - namespace
                type: object
              machineRef:
                description: |-
                  MachineRef is the legacy alias for ConsumerRef, kept for compatibility with
                  existing manifests, print columns, and external readers.
                properties:
                  name:
                    description: Name is the name of the HetznerRobotMachine.
                    type: string
                  namespace:
                    description: Namespace is the namespace of the HetznerRobotMachine.
                    type: string
                required:
                - name
                - namespace
                type: object
              state:
                description: State is the current lifecycle state of the host.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
