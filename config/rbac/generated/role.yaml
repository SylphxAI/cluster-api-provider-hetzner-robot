---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: caphr-manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - clusters
  - clusters/status
  - machines
  - machines/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - hetznerrobotclusters
  - hetznerrobothosts
  - hetznerrobotmachines
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - hetznerrobotclusters/finalizers
  - hetznerrobothosts/finalizers
  - hetznerrobotmachines/finalizers
  verbs:
  - update
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - hetznerrobotclusters/status
  - hetznerrobothosts/status
  - hetznerrobotmachines/status
  verbs:
  - get
  - patch
  - update
